<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绩效管理系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .card { text-align: center; padding: 48px; background: rgba(255,255,255,0.15); border-radius: 16px; backdrop-filter: blur(10px); }
        h1 { font-size: 32px; margin-bottom: 12px; }
        p { opacity: 0.85; margin-bottom: 24px; }
        a { display: inline-block; padding: 12px 32px; background: #fff; color: #667eea; text-decoration: none; border-radius: 8px; font-weight: 600; transition: transform 0.2s; }
        a:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>绩效管理系统</h1>
        <p>企业微信集成验证通过</p>
        <a href="/performance-system/">进入系统</a>
    </div>
</body>
</html>
